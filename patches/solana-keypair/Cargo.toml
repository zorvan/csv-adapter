[package]
name = "solana-keypair"
version = "3.1.2"
edition = "2021"
rust-version = "1.81.0"
authors = ["Anza Maintainers <maintainers@anza.xyz>"]
license = "Apache-2.0"
description = "Concrete implementation of a Solana `Signer`."
homepage = "https://anza.xyz/"
documentation = "https://docs.rs/solana-keypair"
repository = "https://github.com/anza-xyz/solana-sdk"

[lib]
name = "solana_keypair"
path = "src/lib.rs"

[features]
seed-derivable = ["dep:solana-derivation-path", "dep:solana-seed-derivable", "dep:ed25519-dalek-bip32"]

[dependencies.ed25519-dalek]
version = "2.1.1"
features = ["rand_core"]

[dependencies.ed25519-dalek-bip32]
version = "0.3.0"
optional = true

[dependencies.five8]
version = "1.0.0"

[dependencies.five8_core]
version = "1.0.0"

[dependencies.rand]
version = "0.9.2"

[dependencies.solana-address]
version = "2.2.0"
features = ["decode"]

[dependencies.solana-derivation-path]
version = "3.0.0"
optional = true

[dependencies.solana-seed-derivable]
version = "3.0.0"
optional = true

[dependencies.solana-seed-phrase]
version = "3.0.0"

[dependencies.solana-signature]
version = "3.3.0"
features = ["std", "verify"]
default-features = false

[dependencies.solana-signer]
version = "3.0.0"
