name: Production Guarantee Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # ── Phase 1: Production Surface Audit ─────────────────────────
  production-surface-audit:
    name: Production Surface Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Check for production stubs
        run: |
          # Search for stub functions that return "not.*implemented" or similar
          STUBS=$(rg -i "not.*yet.*reimplemented|stub.*function|TODO.*implement|FIXME.*implement" \
            --type rust csv-adapter/src csv-adapter-core/src csv-adapter-bitcoin/src \
            csv-adapter-ethereum/src csv-adapter-sui/src csv-adapter-aptos/src \
            csv-adapter-solana/src csv-wallet/src csv-cli/src \
            --exclude-pattern "tests/" --exclude-pattern "examples/" || true)
          
          if [ -n "$STUBS" ]; then
            echo "ERROR: Found production stubs that need implementation:"
            echo "$STUBS"
            exit 1
          fi
          echo "✓ No production stubs found"

      - name: Check for TODO/FIXME in production code
        run: |
          # Search for TODO and FIXME comments in production source files
          # This is a hard failure to enforce production code completeness
          TODO_FIXME=$(rg -i "TODO|FIXME|XXX|HACK" \
            --type rust csv-adapter/src csv-adapter-core/src csv-adapter-bitcoin/src \
            csv-adapter-ethereum/src csv-adapter-sui/src csv-adapter-aptos/src \
            csv-adapter-solana/src csv-wallet/src csv-cli/src \
            --exclude-pattern "tests/" --exclude-pattern "examples/" \
            --exclude-pattern "// (TODO|FIXME|XXX|HACK):.*test" || true)
          
          if [ -n "$TODO_FIXME" ]; then
            echo "ERROR: Found TODO/FIXME/XXX/HACK comments in production code:"
            echo "$TODO_FIXME"
            echo ""
            echo "Production code must not contain incomplete work markers."
            echo "Either: 1) Complete the implementation, 2) Remove the comment, or 3) Move to examples/tests"
            exit 1
          fi
          echo "✓ No TODO/FIXME markers in production code"

      - name: Check for fake/simulation code
        run: |
          # Search for fake hashes, mock signatures, simulation code outside tests
          FAKE=$(rg -i "fake.*hash|mock.*signature|simulation.*mode|demo.*only" \
            --type rust csv-adapter/src csv-adapter-core/src \
            csv-wallet/src csv-cli/src \
            --exclude-pattern "tests/" --exclude-pattern "examples/" || true)
          
          if [ -n "$FAKE" ]; then
            echo "ERROR: Found fake/simulation code in production:"
            echo "$FAKE"
            exit 1
          fi
          echo "✓ No fake/simulation code found"

      - name: Check for plaintext key persistence
        run: |
          # Search for plaintext key storage outside keystore
          PLAINTEXT=$(rg -i "private_key.*save|mnemonic.*save|plaintext.*store" \
            --type rust csv-wallet/src csv-cli/src \
            --exclude-pattern "keystore" --exclude-pattern "tests/" || true)
          
          if [ -n "$PLAINTEXT" ]; then
            echo "WARNING: Potential plaintext key storage found:"
            echo "$PLAINTEXT"
            # For now, just warn - this may become a hard failure later
          fi
          echo "✓ Plaintext key check complete"

  # ── Phase 2: No Direct Adapter Imports ──────────────────────
  no-direct-adapter-imports:
    name: No Direct Adapter Imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Check CLI for direct adapter imports
        run: |
          # Check if CLI imports chain adapters directly (should only use csv-adapter facade)
          DIRECT_IMPORTS=$(rg "csv_adapter_(bitcoin|ethereum|sui|aptos|solana)" csv-cli/src --glob '*.rs' || true)
          if [ -n "$DIRECT_IMPORTS" ]; then
            echo "ERROR: csv-cli contains direct adapter imports:"
            echo "$DIRECT_IMPORTS"
            exit 1
          fi
          echo "✓ CLI uses only facade APIs"

      - name: Check Wallet for direct adapter imports
        run: |
          # Check if wallet imports chain adapters directly
          DIRECT_IMPORTS=$(rg "csv_adapter_(bitcoin|ethereum|sui|aptos|solana)" csv-wallet/src --glob '*.rs' || true)
          if [ -n "$DIRECT_IMPORTS" ]; then
            echo "ERROR: csv-wallet contains direct adapter imports:"
            echo "$DIRECT_IMPORTS"
            exit 1
          fi
          echo "✓ Wallet uses only facade APIs"

  # ── Phase 3: No Plaintext Key Handling ───────────────────────
  no-plaintext-keys:
    name: No Plaintext Key Handling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Check CLI for plaintext key handling
        run: |
          # Check for direct private key/mnemonic handling outside keystore
          KEY_HANDLING=$(rg -i "private_key|mnemonic.*plain|plaintext.*key" csv-cli/src --glob '*.rs' || true)
          if [ -n "$KEY_HANDLING" ]; then
            echo "WARNING: csv-cli may handle keys directly:"
            echo "$KEY_HANDLING"
            # For now, just warn - this will become a hard failure in Phase 5
          fi

      - name: Check Wallet for plaintext key handling
        run: |
          # Check for direct private key/mnemonic handling outside keystore
          KEY_HANDLING=$(rg -i "private_key|mnemonic.*plain|plaintext.*key" csv-wallet/src --glob '*.rs' || true)
          if [ -n "$KEY_HANDLING" ]; then
            echo "WARNING: csv-wallet may handle keys directly:"
            echo "$KEY_HANDLING"
            # For now, just warn - this will become a hard failure in Phase 5
          fi

  # ── Phase 4: Contract Builds ──────────────────────────────────
  contract-builds:
    name: Contract Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build Ethereum contracts
        run: |
          if [ -d "csv-adapter-ethereum/contracts" ]; then
            cd csv-adapter-ethereum/contracts
            forge build
          else
            echo "Ethereum contracts directory not found"
            exit 1
          fi

      - name: Install Sui CLI
        run: |
          # Install Sui CLI from official release
          SUI_VERSION="testnet"
          wget -q https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-x86_64.tgz
          tar -xzf sui-${SUI_VERSION}-ubuntu-x86_64.tgz
          chmod +x sui
          sudo mv sui /usr/local/bin/
          sui --version

      - name: Build Sui contracts
        run: |
          if [ -d "csv-adapter-sui/contracts" ]; then
            cd csv-adapter-sui/contracts
            sui move build
          else
            echo "Sui contracts directory not found"
            exit 1
          fi

      - name: Install Aptos CLI
        run: |
          # Install Aptos CLI from official release
          APTOS_VERSION="4.2.0"
          wget -q https://github.com/aptos-labs/aptos-core/releases/download/aptos-cli-v${APTOS_VERSION}/aptos-cli-${APTOS_VERSION}-Ubuntu-x86_64.zip
          unzip -q aptos-cli-${APTOS_VERSION}-Ubuntu-x86_64.zip
          chmod +x aptos
          sudo mv aptos /usr/local/bin/
          aptos --version

      - name: Build Aptos contracts
        run: |
          if [ -d "csv-adapter-aptos/contracts" ]; then
            cd csv-adapter-aptos/contracts
            aptos move compile
          else
            echo "Aptos contracts directory not found"
            exit 1
          fi

      - name: Install Anchor
        run: |
          # Install Rust first
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          # Install Anchor CLI
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install latest
          avm use latest
          anchor --version

      - name: Build Solana contracts
        run: |
          if [ -d "csv-adapter-solana/contracts" ]; then
            cd csv-adapter-solana/contracts
            NO_DNA=1 anchor build
          else
            echo "Solana contracts directory not found"
            exit 1
          fi

  # ── Phase 5: WASM Compatibility ─────────────────────────────
  wasm-check:
    name: WASM Target Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Check wallet compiles for WASM
        run: |
          cargo check -p csv-wallet --target wasm32-unknown-unknown 2>&1 | tee wasm-check.log || true
          if grep -q "error" wasm-check.log; then
            echo "ERROR: csv-wallet does not compile for WASM target"
            exit 1
          fi
          echo "✓ Wallet is WASM-compatible"

  # ── Phase 6: Security Audit ─────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  # ── Phase 7: Trait Implementation Check ────────────────────
  trait-implementation-check:
    name: Core Traits Implemented
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check that core traits exist
        run: |
          # Verify that chain_operations module exists and exports traits
          if ! grep -q "pub mod chain_operations" csv-adapter-core/src/lib.rs; then
            echo "ERROR: chain_operations module not found"
            exit 1
          fi

          if ! grep -q "ChainQuery" csv-adapter-core/src/lib.rs; then
            echo "ERROR: ChainQuery trait not re-exported"
            exit 1
          fi

          if ! grep -q "ChainSigner" csv-adapter-core/src/lib.rs; then
            echo "ERROR: ChainSigner trait not re-exported"
            exit 1
          fi

          if ! grep -q "ChainBroadcaster" csv-adapter-core/src/lib.rs; then
            echo "ERROR: ChainBroadcaster trait not re-exported"
            exit 1
          fi

          if ! grep -q "ChainDeployer" csv-adapter-core/src/lib.rs; then
            echo "ERROR: ChainDeployer trait not re-exported"
            exit 1
          fi

          if ! grep -q "ChainProofProvider" csv-adapter-core/src/lib.rs; then
            echo "ERROR: ChainProofProvider trait not re-exported"
            exit 1
          fi

          if ! grep -q "ChainRightOps" csv-adapter-core/src/lib.rs; then
            echo "ERROR: ChainRightOps trait not re-exported"
            exit 1
          fi

          echo "✓ All core chain traits are defined"

      - name: Check that event module exists
        run: |
          if ! grep -q "pub mod events" csv-adapter-core/src/lib.rs; then
            echo "ERROR: events module not found"
            exit 1
          fi

          if ! grep -q "CsvEvent" csv-adapter-core/src/lib.rs; then
            echo "ERROR: CsvEvent not re-exported"
            exit 1
          fi

          echo "✓ Event schemas module is defined"

  # ── Phase 8: Documentation ────────────────────────────────
  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check production guarantee plan exists
        run: |
          if [ ! -f "docs/PRODUCTION_GUARANTEE_PLAN.md" ]; then
            echo "ERROR: PRODUCTION_GUARANTEE_PLAN.md not found"
            exit 1
          fi
          echo "✓ Production guarantee plan exists"

  # ── Final Gate: Production Ready ────────────────────────────
  production-ready:
    name: Production Ready Gate
    runs-on: ubuntu-latest
    needs:
      - production-surface-audit
      - no-direct-adapter-imports
      - contract-builds
      - wasm-check
      - security-audit
      - trait-implementation-check
      - documentation-check

    steps:
      - uses: actions/checkout@v4

      - name: Production Ready Check
        run: |
          echo "=========================================="
          echo "  Production Guarantee Gate Summary"
          echo "=========================================="
          echo ""
          echo "This job aggregates all production guarantee checks."
          echo "It only passes when ALL required gates pass."
          echo ""

          # Overall status
          echo ""
          echo "Status: All critical gates passed ✓"
          echo ""
          echo "Note: The production guarantee is not yet complete."
          echo "Remaining work tracked in docs/PRODUCTION_GUARANTEE_PLAN.md"
