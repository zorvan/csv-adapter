name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # ── Build & Test ──────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build (all features)
        run: cargo build --workspace --all-features

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Run doc tests
        run: cargo test --workspace --doc

  # ── Lint & Format ─────────────────────────────────────────────
  lint:
    name: Clippy & rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Verify fuzz targets compile
        run: cargo check --manifest-path fuzz/Cargo.toml

  # ── RLP Encoding Regression Tests ───────────────────────────────
  rlp-tests:
    name: RLP Encoding Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run RLP encoding tests
        run: cargo test --package csv-wallet test_eth_rlp -- --nocapture
        env:
          ETH_CHAIN_ID: "11155111"

  # ── Audit Dependencies ────────────────────────────────────────
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run audit
        run: cargo audit

  # ── Fuzz Testing ──────────────────────────────────────────────
  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run fuzz targets with corpus
        run: |
          cd fuzz
          # Run each fuzz target for a short duration with corpus
          cargo fuzz run proof_bundle_decode -- -max_total_time=60 fuzz_targets/proof_bundle_decode/corpus || true
          cargo fuzz run consignment_decode -- -max_total_time=60 fuzz_targets/consignment_decode/corpus || true
          cargo fuzz run finality_parser -- -max_total_time=60 fuzz_targets/finality_parser/corpus || true
          cargo fuzz run abi_decoder -- -max_total_time=60 fuzz_targets/abi_decoder/corpus || true
          cargo fuzz run rpc_parser -- -max_total_time=60 fuzz_targets/rpc_parser/corpus || true
