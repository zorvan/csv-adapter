# CSV Local Dev - Docker Compose
# Alternative to running simulators locally
# Usage: docker-compose -f docker-compose.dev.yml up -d

version: '3.8'

services:
  # Bitcoin Regtest
  bitcoin:
    image: ruimarinho/bitcoin-core:25
    container_name: csv-bitcoin-regtest
    command: >
      -regtest
      -server
      -rpcuser=csv-dev
      -rpcpassword=csv-dev-password
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -txindex=1
      -deprecatedrpc=accounts
    ports:
      - "18443:18443"  # RPC
      - "18444:18444"  # P2P
    volumes:
      - bitcoin-data:/root/.bitcoin
    networks:
      - csv-dev-network
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=csv-dev", "-rpcpassword=csv-dev-password", "getblockchaininfo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ethereum (Anvil-like)
  ethereum:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: csv-ethereum-anvil
    command: >
      anvil
      --host 0.0.0.0
      --port 8545
      --chain-id 31337
      --balance 10000
      --gas-limit 30000000
      --block-time 1
    ports:
      - "8545:8545"
    networks:
      - csv-dev-network

  # Sui Devnet
  sui:
    image: mysten/sui-tools:devnet
    container_name: csv-sui-devnet
    command: >
      sui-test-validator
      --with-faucet
      --faucet-port 9123
    ports:
      - "9000:9000"   # JSON-RPC
      - "9123:9123"   # Faucet
      - "9124:9124"   # GraphQL
    networks:
      - csv-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aptos Testing (Local testnet)
  aptos:
    image: aptoslabs/tools:dev
    container_name: csv-aptos-testnet
    command: >
      aptos-node
      --test
      --listen-address 0.0.0.0
      --api-address 0.0.0.0
    ports:
      - "8080:8080"   # REST API
      - "6180:6180"   # P2P
    networks:
      - csv-dev-network

  # CSV Adapter Local Simulator (JavaScript-based)
  csv-simulator:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: csv-local-simulator
    command: node src/index.js start --chains all --fast-mode --no-dashboard
    ports:
      - "8546:8546"   # Unified RPC proxy
    depends_on:
      - bitcoin
      - ethereum
      - sui
      - aptos
    networks:
      - csv-dev-network
    environment:
      - NODE_ENV=development
      - FAST_MODE=true

networks:
  csv-dev-network:
    driver: bridge

volumes:
  bitcoin-data:
    driver: local
