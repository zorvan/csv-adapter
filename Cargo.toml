[workspace]
members = [
    "csv-adapter-core",
    "csv-adapter-bitcoin",
    "csv-adapter-ethereum",
    "csv-adapter-sui",
    "csv-adapter-aptos",
    "csv-adapter-solana",
    "csv-adapter-store",
    "csv-adapter",
    "csv-cli",
    "csv-wallet",
    "csv-explorer"
]
resolver = "2"

[workspace.package]
version = "0.2.0"
authors = ["Amin Razavi, ALL FREE LLMs"]
repository = "https://github.com/zorvan/csv-adapter"
homepage = "https://github.com/zorvan/csv-adapter"
license = "MIT OR Apache-2.0"
edition = "2021"
rust-version = "1.75"

[workspace.dependencies]
parking_lot = "0.12"
serde = { version = "1.0.227", features = ["derive"] }
toml = { version = "0.8", features = ["parse"] }
# Force aws-lc-sys >= 0.39 to fix RUSTSEC-2026-0044 and RUSTSEC-2026-0048
aws-lc-sys = "0.39"

[workspace.lints.rust]
missing_docs = "warn"
unused_imports = "deny"
unused_variables = "deny"
unused_mut = "deny"

[workspace.lints.clippy]
needless_borrows_for_generic_args = "allow"
